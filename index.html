<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Meme Box Pro v2.0</title>
    <style>
        /* --- Styles Généraux (Le look) --- */
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: #1e1e1e; /* Fond gris sombre */
            color: #f0f0f0; /* Texte clair */
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h1 { margin-bottom: 5px; color: #fff; }
        p.subtitle { color: #aaa; margin-top: 0; margin-bottom: 30px; }

        /* --- Zone d'entrée (Le bouton) --- */
        .header {
            margin-bottom: 30px;
            padding: 20px;
            background: #2a2a2a;
            border-radius: 10px;
            display: inline-block;
        }
        input[type="file"] {
            font-size: 16px;
            color: #ddd;
        }

        /* --- La Grille de Memes --- */
        .grid {
            display: grid;
            /* Crée des colonnes automatiques de 180px de large */
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px; /* Espace entre les cases */
            padding: 0;
            margin-top: 20px;
        }

        /* --- Les cases de memes (Conteneurs) --- */
        .meme-container {
            cursor: pointer;
            border: 3px solid transparent; /* Contour invisible de base */
            transition: all 0.2s ease-in-out; /* Animation fluide */
            border-radius: 12px;
            overflow: hidden; /* Pour que l'image ne dépasse pas si on arrondit les angles */
            background: #333;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); /* Légère ombre pour le relief */
            /* Pour s'assurer que le conteneur est carré (aspect ratio 1:1) */
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- L'interaction (Quand on passe la souris) --- */
        .meme-container:hover {
            border-color: #00ff88; /* Contour néon vert */
            transform: scale(1.03); /* Léger zoom */
            box-shadow: 0 6px 12px rgba(0,255,136,0.3); /* Ombre verte fluo */
        }

        /* --- Les images à l'intérieur --- */
        .grid .meme-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* MAGIE : remplit le carré sans déformer l'image */
            display: block;
        }

        /* --- La Notification --- */
        .status {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #00ff88;
            color: #000;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            display: none; /* Cachée par défaut */
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🚀 Ma Meme Box</h1>
        <p class="subtitle">Charge ton dossier et clique pour copier dans Teams (CTRL+V).</p>
        
        <label for="filePicker">📂 Charger mon dossier : </label>
        <input type="file" id="filePicker" webkitdirectory directory multiple>
    </div>
    
    <div class="grid" id="memeGrid">
        </div>
    
    <div id="status" class="status">✅ Copié !</div>

    <script>
        const filePicker = document.getElementById('filePicker');
        const grid = document.getElementById('memeGrid');
        const status = document.getElementById('status');

        filePicker.addEventListener('change', (e) => {
            grid.innerHTML = ''; // Vide la grille précédente
            const files = Array.from(e.target.files);

            files.forEach(file => {
                // On ne garde que les images (jpg, png, gif, webp, etc.)
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        // 1. Créer le conteneur (pour la bordure et le clic)
                        const container = document.createElement('div');
                        container.className = 'meme-container';
                        
                        // 2. Créer l'image
                        const img = document.createElement('img');
                        img.src = event.target.result;
                        img.alt = file.name; // Utilise le nom du fichier comme texte alternatif
                        
                        // Action au clic sur le conteneur pour copier
                        container.onclick = async () => {
                            try {
                                // On récupère le contenu de l'image
                                const response = await fetch(img.src);
                                const blob = await response.blob();
                                // On copie le blob (binaire de l'image)
                                await navigator.clipboard.write([
                                    new ClipboardItem({ [blob.type]: blob })
                                ]);
                                
                                // Afficher la notification de succès
                                status.style.display = 'block';
                                setTimeout(() => status.style.display = 'none', 1500);
                            } catch (err) {
                                console.error('Erreur lors de la copie:', err);
                                alert("Erreur : Impossible de copier l'image. Est-ce un format supporté ?");
                            }
                        };

                        // 3. Assembler : image dans conteneur, conteneur dans grille
                        container.appendChild(img);
                        grid.appendChild(container);
                    };
                    reader.readAsDataURL(file);
                }
            });
        });
    </script>
</body>
</html>
