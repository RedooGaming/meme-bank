<body>
    <h1>🚀 Ma Meme Box Locale</h1>
    <p>Sélectionne ton dossier de memes pour les afficher ici :</p>
    
    <input type="file" id="filePicker" webkitdirectory directory multiple>
    
    <div class="grid" id="memeGrid"></div>
    <div id="status" class="status">Copié !</div>

    <script>
        const filePicker = document.getElementById('filePicker');
        const grid = document.getElementById('memeGrid');

        filePicker.addEventListener('change', (e) => {
            grid.innerHTML = ''; // Vide la grille
            const files = Array.from(e.target.files);

            files.forEach(file => {
                // On ne garde que les images
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = document.createElement('img');
                        img.src = event.target.result;
                        img.className = 'meme-card';
                        
                        // Action au clic pour copier
                        img.onclick = async () => {
                            const response = await fetch(img.src);
                            const blob = await response.blob();
                            await navigator.clipboard.write([
                                new ClipboardItem({ [blob.type]: blob })
                            ]);
                            document.getElementById('status').style.display = 'block';
                            setTimeout(() => document.getElementById('status').style.display = 'none', 1500);
                        };
                        grid.appendChild(img);
                    };
                    reader.readAsDataURL(file);
                }
            });
        });
    </script>
</body>
