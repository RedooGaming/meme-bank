<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">

        .header { background: #2a2a2a; padding: 20px; border-radius: 15px; margin-bottom: 30px; border: 1px solid #444; display: inline-block; }
        
        .letter-section { margin-top: 40px; text-align: left; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .letter-title { color: #00ff88; font-size: 2em; margin-bottom: 15px; text-transform: uppercase; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        
        .meme-card { 
            position: relative; aspect-ratio: 1/1; overflow: hidden; border-radius: 12px; cursor: pointer; 
            border: 2px solid transparent; transition: 0.2s; background: #333;
        }
        .meme-card:hover { border-color: #00ff88; transform: scale(1.02); }
        .meme-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
