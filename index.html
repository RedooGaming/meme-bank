<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Meme Box Collaborative</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .header { background: #2a2a2a; padding: 20px; border-radius: 15px; margin-bottom: 30px; border: 1px solid #444; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .meme-card { 
            aspect-ratio: 1/1; overflow: hidden; border-radius: 10px; cursor: pointer; 
            border: 2px solid transparent; transition: 0.2s; background: #333;
        }
        .meme-card:hover { border-color: #00ff88; transform: scale(1.02); }
        .meme-card img { width: 100%; height: 100%; object-fit: cover; }
        .upload-btn { 
            background: #00ff88; color: black; padding: 10px 20px; border-radius: 5px; 
            cursor: pointer; font-weight: bold; display: inline-block; margin-top: 10px;
        }
        #status { position: fixed; bottom: 20px; right: 20px; background: #00ff88; color: black; padding: 10px; border-radius: 5px; display: none; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🚀 Meme Box Collective</h1>
        <p>Tout le monde peut ajouter des memes ici !</p>
        <label class="upload-btn">
            ➕ Ajouter un Meme
            <input type="file" id="uploadInput" accept="image/*">
        </label>
        <p id="uploadMsg" style="font-size: 0.8em; color: #888;"></p>
    </div>

    <div class="grid" id="memeGrid"></div>
    <div id="status">Copié !</div>

    <script>
        // --- CONFIGURATION SUPABASE ---
        // Remplace par tes vraies infos Supabase :
        const SUPABASE_URL = 'https://lhlybobzysfkgmkygifh.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_BuSFZ_sTsRCErvNGsSqdsQ_ANboA2XX';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const grid = document.getElementById('memeGrid');
        const uploadInput = document.getElementById('uploadInput');

        // 1. Charger les memes existants
        async function loadMemes() {
            grid.innerHTML = "Chargement...";
            const { data, error } = await _supabase.storage.from('memes').list();
            
            if (error) return console.error(error);
            grid.innerHTML = "";

            data.forEach(file => {
                const { data: { publicUrl } } = _supabase.storage.from('memes').getPublicUrl(file.name);
                createMemeCard(publicUrl);
            });
        }

        // 2. Créer une vignette
        function createMemeCard(url) {
            const div = document.createElement('div');
            div.className = 'meme-card';
            div.innerHTML = `<img src="${url}">`;
            div.onclick = () => copyToClipboard(url);
            grid.appendChild(div);
        }

        // 3. Uploader un nouveau meme
        uploadInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('uploadMsg').innerText = "Envoi en cours...";
            const fileName = `${Date.now()}_${file.name}`;
            
            const { error } = await _supabase.storage.from('memes').upload(fileName, file);
            
            if (error) {
                alert("Erreur upload : " + error.message);
            } else {
                document.getElementById('uploadMsg').innerText = "Terminé !";
                loadMemes(); // Rafraîchit la liste
            }
        };

        // 4. Copier l'image
        async function copyToClipboard(url) {
            const response = await fetch(url);
            const blob = await response.blob();
            await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
            const s = document.getElementById('status');
            s.style.display = 'block';
            setTimeout(() => s.style.display = 'none', 1500);
        }

        loadMemes();
    </script>
</body>
</html>
